<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — Irene Odogwu</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="site-header">
    <nav class="nav">
      <a href="index.html" class="nav-brand"><img src="images/irene.jpg" alt="" class="avatar">Irene Odogwu</a>
      <button class="nav-toggle" aria-label="Toggle menu" aria-expanded="false">☰</button>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About Me</a></li>
        <li><a href="projects.html">Projects</a></li>
        <li><a href="planner.html">Planner</a></li>
        <li><a href="contact.html" class="active">Contact</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section class="page-hero" style="padding-bottom: 20px;">
      <div class="arc-motif"></div>
      <div class="wrap">
        <span class="eyebrow-line">Let's talk</span>
        <h1 style="font-size: clamp(2rem, 4vw, 2.8rem);">Get in touch</h1>
        <p style="color: var(--text-muted); max-width: 60ch;">
          Have a project in mind, a question, or just want to connect? Send a message below.
        </p>
      </div>
    </section>

    <section class="section-tight">
      <div class="wrap">
        <form id="contact-form" class="form-card" novalidate>

          <div class="field">
            <label for="name">Name</label>
            <input type="text" id="name" name="name">
            <span class="error" id="name-error"></span>
          </div>

          <div class="field">
            <label for="email">Email address</label>
            <input type="email" id="email" name="email">
            <span class="error" id="email-error"></span>
          </div>

          <div class="field">
            <label for="phone">Phone number</label>
            <input type="tel" id="phone" name="phone" placeholder="Digits only">
            <span class="error" id="phone-error"></span>
          </div>

          <div class="field">
            <label for="message">Message</label>
            <textarea id="message" name="message" placeholder="What's on your mind?"></textarea>
            <span class="error" id="message-error"></span>
          </div>

          <button type="submit" class="btn btn-primary">Send message</button>

          <div class="form-status" id="form-status"></div>
        </form>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <span>© 2026 Irene Odogwu · Software Engineering</span>
    <span><a href="contact.html" class="btn btn-ghost">Reach ME</a></span>
  </footer>

  <script src="js/main.js"></script>
  <script src="js/contact.js"></script>
</body>
</html>
